spring:
  application:
    name: farmer-identity-service
  config:
    import: optional:configserver:http://localhost:8888

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/farmer_db
    username: agri_user
    password: ${FARMER_DB_PASSWORD:agri_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    in.gov.telangana.agri: DEBUG
    org.springframework.security: DEBUG
