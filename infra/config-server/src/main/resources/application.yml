spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations: file:${user.dir}/config
  profiles:
    active: native

server:
  port: 8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    "org.springframework.cloud.config": DEBUG