spring:
  application:
    name: order-delivery-service
  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: agri_user
    password: agri_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8083