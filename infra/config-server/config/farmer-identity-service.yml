spring:
  application:
    name: farmer-identity-service
  datasource:
    url: jdbc:postgresql://farmer-db:5432/farmer_db
    username: agri_user
    password: agri_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081