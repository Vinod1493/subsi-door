spring:
  application:
    name: lease-approval-service
  datasource:
    url: jdbc:postgresql://localhost:5432/lease_db
    username: agri_user
    password: agri_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

minio:
  endpoint: http://localhost:9000
  access-key: agri_minio
  secret-key: agri_minio_pass
  bucket-name: lease-documents

server:
  port: 8084