spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: farmer-identity-service
          uri: lb://farmer-identity-service
          predicates:
            - Path=/api/v1/farmers/**
          filters:
            - StripPrefix=0

        - id: allocation-service
          uri: lb://allocation-service
          predicates:
            - Path=/api/v1/allocations/**
          filters:
            - StripPrefix=0

        - id: order-delivery-service
          uri: lb://order-delivery-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: lease-approval-service
          uri: lb://lease-approval-service
          predicates:
            - Path=/api/v1/leases/**
          filters:
            - StripPrefix=0

        - id: crop-recommendation-service
          uri: lb://crop-recommendation-service
          predicates:
            - Path=/api/v1/recommendations/**
          filters:
            - StripPrefix=0

        - id: chatbot-service
          uri: lb://chatbot-service
          predicates:
            - Path=/api/v1/chat/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
