spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: farmer-identity-service
              uri: http://farmer-identity-service:8081
              predicates:
                - Path=/api/v1/farmers/**
              filters:
                - StripPrefix=0

            - id: allocation-service
              uri: http://allocation-service:8082
              predicates:
                - Path=/api/v1/allocations/**
              filters:
                - StripPrefix=0

            - id: order-delivery-service
              uri: http://order-delivery-service:8083
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=0

            - id: lease-approval-service
              uri: http://lease-approval-service:8084
              predicates:
                - Path=/api/v1/leases/**
              filters:
                - StripPrefix=0

            - id: crop-recommendation-service
              uri: http://crop-recommendation-service:8085
              predicates:
                - Path=/api/v1/recommendations/**
              filters:
                - StripPrefix=0

            - id: chatbot-service
              uri: http://chatbot-service:8086
              predicates:
                - Path=/api/v1/chat/**
              filters:
                - StripPrefix=0

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
