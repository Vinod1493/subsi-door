spring:
  application:
    name: crop-recommendation-service
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_db
    username: agri_user
    password: agri_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8086

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5
    max-tokens: 1000